        have:"Entiende la cobertura de salud para la vejez.", miss:"Los costos médicos en la vejez pueden ser enormes: no estar preparado es un riesgo real."},
      {q:"¿Tiene un Fideicomiso en Vida / Testamento?", opts:["Tengo un Fideicomiso en Vida","Solo un Testamento","Nada aún","No sé qué es"],
        have:"Tiene documentos patrimoniales.", miss:"Sin Fideicomiso en Vida: su familia podría enfrentar un proceso sucesorio costoso y largo."},
    ],
  },
};

let lang = (navigator.language||"en").slice(0,2);
if(!T[lang]) lang = "en";
let step=0; const answers={}; const scores={retire:0,family:0,health:0,estate:0};
const $=id=>document.getElementById(id);

function applyLang(){
  const t=T[lang];
  document.documentElement.lang=lang;
  $('introTitle').innerHTML=t.introTitle;
  $('introPills').innerHTML=Object.values(t.pillars).map(p=>`<span>${p}</span>`).join("");
  $('introSub').textContent=t.introSub;
  $('step1').innerHTML=t.steps[0]; $('step2').innerHTML=t.steps[1]; $('step3').innerHTML=t.steps[2];
  $('startBtn').textContent=t.startBtn; $('introSmall').textContent=t.introSmall;
  $('formTitle').textContent=t.formTitle; $('formSub').innerHTML=t.formSub;
  $('name').placeholder=t.ph[0]; $('phone').placeholder=t.ph[1]; $('email').placeholder=t.ph[2];
  $('submitBtn').textContent=t.submit; $('formSmall').textContent=t.formSmall;
  $('resPrefix').textContent=t.resPrefix; $('disc').textContent=t.disc;
  document.querySelectorAll('.langbar button').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
  if(!$('quiz').classList.contains('hidden')) render();
}
document.querySelectorAll('.langbar button').forEach(b=>{
  b.onclick=()=>{ lang=b.dataset.lang; applyLang(); };
});

function start(){ $('intro').classList.add('hidden'); $('quiz').classList.remove('hidden'); render(); }
function render(){
  const base=QBASE[step], t=T[lang].q[step];
  $('bar').style.width=(step/QBASE.length*100)+"%";
  $('qtext').textContent=`${step+1}. ${t.q}`;
  const box=$('opts'); box.innerHTML="";
  t.opts.forEach((label,j)=>{
    const b=document.createElement('button'); b.className="opt"; b.textContent=label;
    b.onclick=()=>{ answers[base.key]=label; if(base.pillar!=="context") scores[base.pillar]=base.pts[j]; next(); };
    box.appendChild(b);
  });
}
function next(){ step++; if(step<QBASE.length) render(); else showForm(); }
function showForm(){ $('bar').style.width="100%"; $('quiz').classList.add('hidden'); $('form').classList.remove('hidden'); }
function colorFor(s){ return s>=20?"var(--green)":s>=12?"var(--amber)":"var(--red)"; }

function showResult(name){
  const t=T[lang], total=scores.retire+scores.family+scores.health+scores.estate;
  $('rName').textContent=name.split(" ").pop();
  const band = total>=80?[ "var(--green)",t.bands[0]] : total>=60?["#2563EB",t.bands[1]]
             : total>=40?["var(--amber)",t.bands[2]] : ["var(--red)",t.bands[3]];
  $('scoreLabel').textContent=band[1]; $('scoreLabel').style.color=band[0];
  let cur=0; const ring=$('ring');
  const tick=setInterval(()=>{ cur+=2; if(cur>=total){cur=total; clearInterval(tick);}
    $('scoreNum').textContent=cur;
    ring.style.background=`conic-gradient(${band[0]} ${cur*3.6}deg, var(--line) 0deg)`; },18);

  const pbox=$('pillars'); pbox.innerHTML=""; const missing=[];
  ["retire","family","health","estate"].forEach(k=>{
    const s=scores[k], name2=t.pillars[k], idx=QBASE.findIndex(x=>x.pillar===k), qt=t.q[idx], good=s>=18;
    if(!good) missing.push(name2);
    pbox.insertAdjacentHTML('beforeend',
      `<div class="pillar"><div class="pillar-top"><span class="pillar-name">${name2}</span><span class="pillar-score">${s}/25</span></div>
        <div class="pbar"><span style="width:${s/25*100}%;background:${colorFor(s)}"></span></div>
        <div class="pillar-note"><span class="ic">${good?'✅':'⚠️'}</span><span>${good?qt.have:qt.miss}</span></div></div>`);
  });
  $('summary').innerHTML = missing.length===0 ? t.sumOk : t.sumGap.replace("{list}", missing.join(", "));
  $('bookLink').textContent=t.book; $('bookLink').href=BOOK_URL;
  $('form').classList.add('hidden'); $('result').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}
async function submitLead(){
  const t=T[lang], name=$('name').value.trim(), phone=$('phone').value.trim(), email=$('email').value.trim();
  if(!name||!phone||!email){ alert(t.alertFill); return; }
  $('submitBtn').disabled=true; $('submitBtn').textContent=t.submitting;
  const total=scores.retire+scores.family+scores.health+scores.estate;
  const gaps=Object.keys(scores).filter(k=>scores[k]<18).join(", ");
  try{
    if(ACCESS_KEY && !ACCESS_KEY.includes("PASTE_")){
      await fetch("https://api.web3forms.com/submit",{
        method:"POST",
        headers:{"Content-Type":"application/json", Accept:"application/json"},
        body:JSON.stringify({
          access_key: ACCESS_KEY,
          subject: "🔔 LEAD MỚI từ Quiz: "+name+" — Điểm "+total+"/100",
          from_name: "Financial Protection Quiz",
          name, phone, email,
          score: total+" / 100",
          language: lang,
          interested_in: gaps || "(toàn diện)",
          answers: JSON.stringify(answers)
        })
      });
    }
  }catch(e){ console.warn(e); }
  showResult(name);
}
applyLang();
</script>
</body>
</html>
